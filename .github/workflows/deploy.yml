name: Deploy

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            environment:
                description: Target environment
                required: true
                default: dev
                type: choice
                options:
                    - dev
                    - prod

# OIDC: only needed for ECR push (build-and-push job).
# The deploy step is GitOps — the workflow commits the new tag back to the repo
# and ArgoCD detects the change and syncs the cluster automatically.
permissions:
    id-token: write # required for OIDC token exchange
    contents: read # overridden to write in update-manifests job

env:
    AWS_REGION: eu-central-1

jobs:
    # ──────────────────────────────────────────────────────────────────────────
    # 1. Tests — uncomment once test suites are in place
    # ──────────────────────────────────────────────────────────────────────────
    # test:
    #     name: Test
    #     runs-on: ubuntu-latest
    #     defaults:
    #         run:
    #             working-directory: server
    #     steps:
    #         - uses: actions/checkout@v4
    #         - name: Set up Java 25
    #           uses: actions/setup-java@v4
    #           with:
    #               java-version: '25'
    #               distribution: temurin
    #               cache: gradle
    #         - name: Grant execute permission to Gradle wrapper
    #           run: chmod +x gradlew
    #         - name: Run tests
    #           run: ./gradlew test --no-daemon --continue
    #         - name: Upload test reports on failure
    #           if: failure()
    #           uses: actions/upload-artifact@v4
    #           with:
    #               name: test-reports
    #               path: server/build/reports/tests/
    #               retention-days: 7

    # ──────────────────────────────────────────────────────────────────────────
    # 2. Build & push — parallel matrix across all 5 services
    # ──────────────────────────────────────────────────────────────────────────
    build-and-push:
        name: Build & Push (${{ matrix.service }})
        # needs: test   # uncomment once the test job is re-enabled
        runs-on: ubuntu-latest

        strategy:
            matrix:
                service:
                    - auth-service
                    - user-service
                    - api-gateway
                    - crate-service
                    - sync-service

        steps:
            - uses: actions/checkout@v4

            - name: Configure AWS credentials (OIDC)
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build and push image
              working-directory: server
              env:
                  REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  REPO: jv-eks-dev/${{ matrix.service }}
                  TAG: ${{ github.sha }}
              run: |
                  SHORT_SHA="${TAG::8}"
                  IMAGE="${REGISTRY}/${REPO}"

                  docker build \
                    -f services/${{ matrix.service }}/Dockerfile \
                    -t "${IMAGE}:${SHORT_SHA}" \
                    -t "${IMAGE}:latest" \
                    .

                  docker push "${IMAGE}:${SHORT_SHA}"
                  docker push "${IMAGE}:latest"

    # ──────────────────────────────────────────────────────────────────────────
    # 3. Update manifests — commit new image tag; ArgoCD syncs the rest
    #    dev:  ArgoCD auto-syncs (automated syncPolicy in app-dev.yaml)
    #    prod: ArgoCD shows OutOfSync — operator clicks Sync in the UI
    # ──────────────────────────────────────────────────────────────────────────
    update-manifests:
        name: Update image tags
        needs: build-and-push
        runs-on: ubuntu-latest
        permissions:
            contents: write # allow push back to repo

        steps:
            - uses: actions/checkout@v4
              with:
                  # If branch protection is enabled on main, replace GITHUB_TOKEN
                  # with a PAT stored as secret GH_PAT:
                  #   token: ${{ secrets.GH_PAT }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Update image tags in kustomization files
              run: |
                  SHORT_SHA="${GITHUB_SHA::8}"
                  sed -i "s|newTag: .*|newTag: ${SHORT_SHA}|g" \
                    k8s/overlays/dev/kustomization.yaml \
                    k8s/overlays/prod/kustomization.yaml

            - name: Commit and push
              run: |
                  SHORT_SHA="${GITHUB_SHA::8}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add k8s/overlays/dev/kustomization.yaml \
                          k8s/overlays/prod/kustomization.yaml
                  # Exit cleanly if nothing changed (e.g. re-run on same SHA)
                  git diff --staged --quiet && exit 0
                  git commit -m "ci: update image tags to ${SHORT_SHA} [skip ci]"
                  git push
