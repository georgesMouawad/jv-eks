apiVersion: apps/v1
kind: Deployment
metadata:
    name: auth-service
spec:
    replicas: 1
    selector:
        matchLabels:
            app: auth-service
    template:
        metadata:
            labels:
                app: auth-service
        spec:
            initContainers:
                - name: create-db
                  image: postgres:15-alpine
                  command:
                      - sh
                      - -c
                      - |
                          until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER"; do
                            echo "Waiting for PostgreSQL..."; sleep 2;
                          done
                          psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -tc \
                            "SELECT 1 FROM pg_database WHERE datname='auth_db'" \
                            | grep -q 1 || psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" \
                            -c "CREATE DATABASE auth_db"
                  env:
                      - name: DB_HOST
                        valueFrom:
                            configMapKeyRef:
                                name: auth-service-config
                                key: DB_HOST
                      - name: DB_PORT
                        value: '5432'
                      - name: DB_USER
                        valueFrom:
                            configMapKeyRef:
                                name: auth-service-config
                                key: SPRING_DATASOURCE_USERNAME
                      - name: PGPASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: db-secret
                                key: SPRING_DATASOURCE_PASSWORD
            containers:
                - name: auth-service
                  image: auth-service:latest
                  ports:
                      - containerPort: 8081
                  envFrom:
                      - configMapRef:
                            name: auth-service-config
                  env:
                      - name: SPRING_DATASOURCE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: db-secret
                                key: SPRING_DATASOURCE_PASSWORD
                      - name: JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: jwt-secret
                                key: JWT_SECRET
                  livenessProbe:
                      httpGet:
                          path: /actuator/health/liveness
                          port: 8081
                      initialDelaySeconds: 60
                      periodSeconds: 15
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /actuator/health/readiness
                          port: 8081
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      failureThreshold: 3
                  resources:
                      requests:
                          cpu: 128m
                          memory: 256Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
