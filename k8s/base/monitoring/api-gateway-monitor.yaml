apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
    name: api-gateway
    labels:
        app: api-gateway
spec:
    namespaceSelector:
        matchNames:
            - jv-eks
    selector:
        matchLabels:
            app: api-gateway
    endpoints:
        - port: http
          path: /actuator/prometheus
          interval: 30s
          scrapeTimeout: 10s
