apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
    name: crate-service
    labels:
        app: crate-service
spec:
    namespaceSelector:
        matchNames:
            - jv-eks
    selector:
        matchLabels:
            app: crate-service
    endpoints:
        - port: http
          path: /actuator/prometheus
          interval: 30s
          scrapeTimeout: 10s
