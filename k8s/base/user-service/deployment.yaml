apiVersion: apps/v1
kind: Deployment
metadata:
    name: user-service
spec:
    replicas: 1
    selector:
        matchLabels:
            app: user-service
    template:
        metadata:
            labels:
                app: user-service
        spec:
            initContainers:
                - name: check-db-ready
                  image: postgres:16-alpine
                  command: ['sh', '-c', 'until pg_isready -h $(DB_HOST); do echo "waiting for postgres..."; sleep 2; done']
                  envFrom:
                      - configMapRef:
                            name: user-service-config
                - name: create-db
                  image: postgres:16-alpine
                  command:
                      - sh
                      - -c
                      - |
                          psql "postgresql://$(SPRING_DATASOURCE_USERNAME):$(SPRING_DATASOURCE_PASSWORD)@$(DB_HOST)/postgres" \
                            -c "CREATE DATABASE user_db;" 2>/dev/null \
                            || echo "user_db already exists, continuing"
                  envFrom:
                      - configMapRef:
                            name: user-service-config
                  env:
                      - name: SPRING_DATASOURCE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: db-secret
                                key: SPRING_DATASOURCE_PASSWORD
            containers:
                - name: user-service
                  image: user-service:latest
                  ports:
                      - containerPort: 8082
                  envFrom:
                      - configMapRef:
                            name: user-service-config
                  env:
                      - name: SPRING_DATASOURCE_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: db-secret
                                key: SPRING_DATASOURCE_PASSWORD
                      - name: JWT_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: jwt-secret
                                key: JWT_SECRET
                  livenessProbe:
                      httpGet:
                          path: /actuator/health/liveness
                          port: 8082
                      initialDelaySeconds: 60
                      periodSeconds: 15
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /actuator/health/readiness
                          port: 8082
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      failureThreshold: 3
                  resources:
                      requests:
                          cpu: 128m
                          memory: 256Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
