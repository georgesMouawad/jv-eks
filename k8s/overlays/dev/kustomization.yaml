apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: jv-eks

# ── Secrets (Sealed Secrets) — generated once with kubeseal, safe to commit ──
# See sealed-secrets/*.yaml for generation instructions.
resources:
    - ../../base
    - sealed-secrets/db-secret.yaml
    - sealed-secrets/jwt-secret.yaml

# ── Patches — environment-specific ConfigMap values and Ingress host ──────────
images:
    - name: auth-service
      newName: 648597472109.dkr.ecr.eu-central-1.amazonaws.com/jv-eks-dev/auth-service
      newTag: latest
    - name: user-service
      newName: 648597472109.dkr.ecr.eu-central-1.amazonaws.com/jv-eks-dev/user-service
      newTag: latest
    - name: api-gateway
      newName: 648597472109.dkr.ecr.eu-central-1.amazonaws.com/jv-eks-dev/api-gateway
      newTag: latest
    - name: crate-service
      newName: 648597472109.dkr.ecr.eu-central-1.amazonaws.com/jv-eks-dev/crate-service
      newTag: latest
    - name: sync-service
      newName: 648597472109.dkr.ecr.eu-central-1.amazonaws.com/jv-eks-dev/sync-service
      newTag: latest
    - name: client
      newName: 648597472109.dkr.ecr.eu-central-1.amazonaws.com/jv-eks-dev/client
      newTag: latest

# ── Patches — environment-specific ConfigMap values and Ingress host ──────────
patches:
    - path: patches/auth-service-configmap.yaml
    - path: patches/user-service-configmap.yaml
    - path: patches/api-gateway-ingress.yaml
    - path: patches/crate-service-configmap.yaml
    - path: patches/sync-service-configmap.yaml
    - path: patches/crate-service-serviceaccount.yaml
