# Strategic merge patch — adds/overrides keys in the base ConfigMap.
# Replace <RDS_ENDPOINT> with the value from `tofu output rds_endpoint` (strip the :5432 port suffix).
apiVersion: v1
kind: ConfigMap
metadata:
    name: user-service-config
    namespace: jv-eks
data:
    SPRING_DATASOURCE_URL: jdbc:postgresql://<RDS_ENDPOINT>:5432/user_db
    SPRING_DATASOURCE_USERNAME: postgres
