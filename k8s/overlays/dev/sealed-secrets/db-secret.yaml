# Seal this secret locally using the committed public cert.
# No live cluster access needed after the cert is committed to k8s/certs/.
#
#   kubectl create secret generic db-secret \
#     --namespace jv-eks \
#     --from-literal=SPRING_DATASOURCE_PASSWORD=<your-password> \
#     --dry-run=client -o yaml | \
#   kubeseal --cert k8s/certs/sealed-secrets-dev.pem --format yaml \
#     > k8s/overlays/dev/sealed-secrets/db-secret.yaml
#
# Commit the result — SealedSecrets are safe to commit (encrypted with the cluster's public key).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: db-secret
    namespace: jv-eks
spec:
    encryptedData:
        SPRING_DATASOURCE_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    template:
        metadata:
            name: db-secret
            namespace: jv-eks
        type: Opaque
