# Seal this secret locally using the committed public cert.
#
#   kubectl create secret generic jwt-secret \
#     --namespace jv-eks \
#     --from-literal=JWT_SECRET=<your-base64-jwt-key> \
#     --dry-run=client -o yaml | \
#   kubeseal --cert k8s/certs/sealed-secrets-dev.pem --format yaml \
#     > k8s/overlays/dev/sealed-secrets/jwt-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: jwt-secret
    namespace: jv-eks
spec:
    encryptedData:
        JWT_SECRET: REPLACE_WITH_KUBESEAL_OUTPUT
    template:
        metadata:
            name: jwt-secret
            namespace: jv-eks
        type: Opaque
