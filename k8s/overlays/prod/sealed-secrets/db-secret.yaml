# Seal this secret locally using the committed prod public cert.
# The prod controller's key is different from dev — fetch and commit it separately:
#   kubeseal --controller-namespace kube-system \
#            --controller-name sealed-secrets \
#            --fetch-cert > k8s/certs/sealed-secrets-prod.pem
#
#   kubectl create secret generic db-secret \
#     --namespace jv-eks \
#     --from-literal=SPRING_DATASOURCE_PASSWORD=<prod-password> \
#     --dry-run=client -o yaml | \
#   kubeseal --cert k8s/certs/sealed-secrets-prod.pem --format yaml \
#     > k8s/overlays/prod/sealed-secrets/db-secret.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
    name: db-secret
    namespace: jv-eks
spec:
    encryptedData:
        SPRING_DATASOURCE_PASSWORD: REPLACE_WITH_KUBESEAL_OUTPUT
    template:
        metadata:
            name: db-secret
            namespace: jv-eks
        type: Opaque
