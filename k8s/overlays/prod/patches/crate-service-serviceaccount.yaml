# Strategic merge patch — sets the prod IRSA role ARN on the crate-service ServiceAccount.
apiVersion: v1
kind: ServiceAccount
metadata:
    name: crate-service
    namespace: jv-eks
    annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID_PROD>:role/jv-eks-prod-crate-service-irsa
