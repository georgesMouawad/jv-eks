spring:
    application:
        name: crate-service
    docker:
        compose:
            enabled: false
    datasource:
        url: jdbc:postgresql://localhost:5432/crate_db
        username: postgres
        password: password
    jpa:
        hibernate:
            ddl-auto: update
    data:
        redis:
            host: localhost
            port: 6379

server:
    port: 8083

jwt:
    secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudA==

aws:
    region: eu-central-1
    s3:
        bucket-name: jv-eks-dev-cratesync-audio-assets

management:
    endpoints:
        web:
            exposure:
                include: health,prometheus
    endpoint:
        health:
            probes:
                enabled: true
