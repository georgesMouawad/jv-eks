spring:
    application:
        name: auth-service
    docker:
        compose:
            enabled: false
    datasource:
        url: jdbc:postgresql://localhost:5432/auth_db
        username: postgres
        password: password
        # driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: none
    flyway:
        locations: classpath:db/migration
        baseline-on-migrate: false
        # show-sql: true
        # properties:
        #     hibernate:
        #         format_sql: true

server:
    port: 8081

jwt:
    secret: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBkZXZlbG9wbWVudA==
    expiration-ms: 86400000 # 24 hours

management:
    endpoints:
        web:
            exposure:
                include: health,prometheus
    endpoint:
        health:
            probes:
                enabled: true
