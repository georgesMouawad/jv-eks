spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            mvc:
                routes:
                    - id: auth-service
                      uri: http://localhost:8081
                      predicates:
                          - Path=/api/auth/**

                    - id: user-service
                      uri: http://localhost:8082
                      predicates:
                          - Path=/api/users/**

server:
    port: 8080

management:
    endpoints:
        web:
            exposure:
                include: health,prometheus
    endpoint:
        health:
            probes:
                enabled: true
